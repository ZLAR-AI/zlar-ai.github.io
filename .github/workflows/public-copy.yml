name: Public Copy Guard

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check public copy
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ZLAR_REQUIRE_LATEST_RELEASE_FRESHNESS: "true"
        run: bash scripts/check-public-copy.sh
